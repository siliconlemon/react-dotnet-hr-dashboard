<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      id="app-favicon"
      rel="icon"
      type="image/svg+xml"
      sizes="any"
      href="/favicon.svg?v=20260503b"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Simplified enterprise-style HR dashboard for workforce, PTO, and org data (React, MUI, .NET demo)."
    />
    <meta name="application-name" content="Smatch HR" />
    <meta name="theme-color" content="#152a45" />
    <meta property="og:title" content="Smatch HR" />
    <meta
      property="og:description"
      content="Simplified enterprise-style HR dashboard — React, MUI, and .NET 8 (demo project)."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <!-- Match `COLOR_MODE_STORAGE_KEY` + applyDocumentColorScheme (ColorModeProvider). Runs before paint. -->
    <script>
      (function () {
        try {
          var k = 'hr-dashboard-color-mode';
          var m = localStorage.getItem(k);
          document.documentElement.style.colorScheme = m === 'dark' ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <title>Smatch HR</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
