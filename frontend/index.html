<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      id="app-favicon"
      rel="icon"
      type="image/svg+xml"
      sizes="any"
      href="__FAVICON_HREF__"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Match `COLOR_MODE_STORAGE_KEY` + applyDocumentColorScheme (ColorModeProvider). Runs before paint. -->
    <script>
      (function () {
        try {
          var k = 'hr-dashboard-color-mode';
          var m = localStorage.getItem(k);
          document.documentElement.style.colorScheme = m === 'dark' ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <title>Smatch HR</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
