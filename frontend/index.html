<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="__FAVICON_HREF__" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Match `COLOR_MODE_STORAGE_KEY` + applyDocumentColorScheme (ColorModeProvider). Runs before paint so the first scrollbar chrome matches the stored theme. -->
    <script>
      (function () {
        try {
          var k = 'hr-dashboard-color-mode';
          var m = localStorage.getItem(k);
          document.documentElement.style.colorScheme = m === 'dark' ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <title>HR Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
